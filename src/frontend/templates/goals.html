<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Goals</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
  <header class="navBar">
    <div class="logo">Build Your Budget</div>
    <nav>
      <a href="/dashboard">Dashboard</a>
      <a href="/goals">Goals</a>
      <a href="/reports">Reports</a>
      <a href="/logout">Logout</a>
    </nav>
  </header>

  <main class="dashboard-container">
    <div class="dashboard-header">
      <h1>Financial Goals</h1>
      <p>Create savings goals, track progress, and mark goals complete.</p>
    </div>

    <div class="dashboard-card">
      <h2>Add Goal</h2>

      <form id="goalForm" class="dashboard-form">
        <div>
          <label>Goal Name</label>
          <input id="goalName" type="text" placeholder="Emergency Fund" required>
        </div>

        <div>
          <label>Target Amount</label>
          <input id="goalTarget" type="number" step="0.01" min="0" placeholder="1000" required>
        </div>

        <div>
          <label>Current Saved</label>
          <input id="goalSaved" type="number" step="0.01" min="0" placeholder="0">
        </div>

        <div class="form-actions">
          <button type="submit">Add Goal</button>
          <span id="goalMsg" class="muted"></span>
        </div>
      </form>
    </div>

    <div class="summary-grid">
      <div class="summary-card">
        <p>Total Goals</p>
        <h2 id="totalGoals">0</h2>
      </div>

      <div class="summary-card">
        <p>Completed</p>
        <h2 id="completedGoals">0</h2>
      </div>

      <div class="summary-card">
        <p>Total Saved</p>
        <h2 id="totalSaved">$0.00</h2>
      </div>
    </div>

    <div class="dashboard-card">
      <h2>Goal List</h2>
      <div id="goalList" class="goal-list"></div>
    </div>
  </main>

  <script>
    let goals = JSON.parse(localStorage.getItem("budgetGoals")) || [];

    const goalForm = document.getElementById("goalForm");
    const goalList = document.getElementById("goalList");
    const goalMsg = document.getElementById("goalMsg");

    goalForm.addEventListener("submit", function(e) {
      e.preventDefault();

      const name = document.getElementById("goalName").value.trim();
      const target = Number(document.getElementById("goalTarget").value);
      const saved = Number(document.getElementById("goalSaved").value) || 0;

      if (!name || target <= 0 || saved < 0) {
        goalMsg.textContent = "Enter valid goal details.";
        return;
      }

      goals.push({
        id: Date.now(),
        name: name,
        target: target,
        saved: saved,
        complete: saved >= target
      });

      saveGoals();
      goalForm.reset();
      goalMsg.textContent = "Goal added.";
      renderGoals();
    });

    function saveGoals() {
      localStorage.setItem("budgetGoals", JSON.stringify(goals));
    }

    function addSavedAmount(id) {
      const amount = Number(prompt("How much money do you want to add?"));

      if (!Number.isFinite(amount) || amount <= 0) {
        return;
      }

      goals = goals.map(goal => {
        if (goal.id === id) {
          const newSaved = goal.saved + amount;
          return {
            ...goal,
            saved: newSaved,
            complete: newSaved >= goal.target
          };
        }

        return goal;
      });

      saveGoals();
      renderGoals();
    }

    function markComplete(id) {
      goals = goals.map(goal => {
        if (goal.id === id) {
          return {
            ...goal,
            saved: goal.target,
            complete: true
          };
        }

        return goal;
      });

      saveGoals();
      renderGoals();
    }

    function deleteGoal(id) {
      goals = goals.filter(goal => goal.id !== id);
      saveGoals();
      renderGoals();
    }

    function renderGoals() {
      goalList.innerHTML = "";

      const totalGoals = goals.length;
      const completedGoals = goals.filter(goal => goal.complete).length;
      const totalSaved = goals.reduce((sum, goal) => sum + Number(goal.saved), 0);

      document.getElementById("totalGoals").textContent = totalGoals;
      document.getElementById("completedGoals").textContent = completedGoals;
      document.getElementById("totalSaved").textContent = `$${totalSaved.toFixed(2)}`;

      if (goals.length === 0) {
        goalList.innerHTML = `<p class="muted">No goals added yet.</p>`;
        return;
      }

      goals.forEach(goal => {
        const percent = Math.min((goal.saved / goal.target) * 100, 100);
        const remaining = Math.max(goal.target - goal.saved, 0);

        const card = document.createElement("div");
        card.className = "goal-item";

        card.innerHTML = `
          <div class="goal-top-row">
            <div>
              <h3>${escapeHtml(goal.name)}</h3>
              <p class="muted">
                Saved $${Number(goal.saved).toFixed(2)} of $${Number(goal.target).toFixed(2)}
              </p>
              <p class="muted">
                Remaining: $${remaining.toFixed(2)}
              </p>
            </div>

            <span class="${goal.complete ? "status-complete" : "status-active"}">
              ${goal.complete ? "Complete" : "Active"}
            </span>
          </div>

          <div class="progress-bar">
            <div class="progress-fill" style="width: ${percent}%"></div>
          </div>

          <div class="goal-actions">
            <button type="button" onclick="addSavedAmount(${goal.id})">Add Saved</button>
            <button type="button" onclick="markComplete(${goal.id})">Mark Complete</button>
            <button type="button" class="danger-button" onclick="deleteGoal(${goal.id})">Delete</button>
          </div>
        `;

        goalList.appendChild(card);
      });
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    renderGoals();
  </script>
</body>
</html>
