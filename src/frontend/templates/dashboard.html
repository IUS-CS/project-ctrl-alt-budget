<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>

  <!-- Example JS/CSS library you can keep using later -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">


</head>

<body>
  <header class="navBar">
  <div class="logo">Build Your Budget</div>
  <nav>
    <a href="/dashboard">Dashboard</a>
    <a href="/goals">Goals</a>
    <a href="/reports">Reports</a>
    <a href="/logout">Logout</a>
  </nav>
</header>

<main class="dashboard-container">

  <div class="dashboard-header">
    <h1>Budget Dashboard</h1>
    <p>View your income, expenses, balance, and recent transactions.</p>
  </div>

  <div class="summary-grid">
    <div class="summary-card">
      <p>Income</p>
      <h2 id="incomeTotal">$0.00</h2>
    </div>

    <div class="summary-card">
      <p>Expenses</p>
      <h2 id="expenseTotal">$0.00</h2>
    </div>

    <div class="summary-card">
      <p>Balance</p>
      <h2 id="balanceTotal">$0.00</h2>
    </div>
  </div>

  <div class="dashboard-card">
    <h2>Add Transaction</h2>

    <form id="txForm" class="dashboard-form">
      <div>
        <label>Date</label>
        <input id="date" type="date" required />
      </div>

      <div>
        <label>Description</label>
        <input id="desc" type="text" placeholder="Example: Rent" required />
      </div>

      <div>
        <label>Type</label>
        <select id="type">
          <option value="EXPENSE" selected>EXPENSE</option>
          <option value="INCOME">INCOME</option>
        </select>
      </div>

      <div>
        <label>Amount</label>
        <input id="amount" type="number" step="0.01" placeholder="12.99" required />
      </div>

      <div class="form-actions">
        <button type="submit">Submit</button>
        <span id="msg" class="muted"></span>
      </div>
    </form>

    <hr />
</div>
   

  <div class="dashboard-card">
    <h2>Recent Transactions</h2>
    <div class="table-responsive">
      <table class="transaction-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Description</th>
            <th>Type</th>
            <th>Amount</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>

</main>

  <script>
    // Prototype behavior:
    // - Uses mock data now
    // - Shows planned fetch() calls for the real backend later

    let mockTxs = JSON.parse(localStorage.getItem("budgetTransactions")) || [
  
];

function saveTransactions() {
  localStorage.setItem("budgetTransactions", JSON.stringify(mockTxs));
}

    const rowsEl = document.getElementById("rows");
    const incomeEl = document.getElementById("incomeTotal");
    const expenseEl = document.getElementById("expenseTotal");
    const balanceEl = document.getElementById("balanceTotal");
    const msgEl = document.getElementById("msg");

    document.getElementById("date").valueAsDate = new Date();

    render(mockTxs);

    document.getElementById("txForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      msgEl.textContent = "";

      const tx = {
        date: document.getElementById("date").value,
        desc: document.getElementById("desc").value.trim(),
        type: document.getElementById("type").value,
        amount: Number(document.getElementById("amount").value)
      };

      if (!tx.date || !tx.desc || !Number.isFinite(tx.amount) || tx.amount <= 0) {
        msgEl.textContent = "Fill out all fields correctly.";
        return;
      }

      // Planned real call later:
      // await fetch("/api/transactions", {
      //   method: "POST",
      //   headers: { "Content-Type": "application/json" },
      //   body: JSON.stringify(tx)
      // });

      // For prototype: just show it worked and add to mock list.
      mockTxs.unshift(tx);
      saveTransactions();
      render(mockTxs);

      e.target.reset();
      document.getElementById("date").valueAsDate = new Date();
      document.getElementById("type").value = "EXPENSE";
      
    });

    function render(txs) {
      rowsEl.innerHTML = "";

      let income = 0;
      let expenses = 0;

     txs.forEach((t, index) => {
      const tr = document.createElement("tr");

       tr.innerHTML = `
        <td>${escapeHtml(t.date)}</td>
        <td>${escapeHtml(t.desc)}</td>
        <td>${escapeHtml(t.type)}</td>
        <td>$${Number(t.amount).toFixed(2)}</td>
        <td>
          <button type="button" class="small-danger-button" onclick="deleteTransaction(${index})">
            Delete
      </button>
    </td>
  `;

  rowsEl.appendChild(tr);

  if (t.type === "INCOME") {
    income += Number(t.amount);
  } else {
    expenses += Number(t.amount);
  }
});

      const balance = income - expenses;
      incomeEl.textContent = `$${income.toFixed(2)}`;
      expenseEl.textContent = `$${expenses.toFixed(2)}`;
      balanceEl.textContent = `$${balance.toFixed(2)}`;
    }
    function deleteTransaction(index) {
      mockTxs.splice(index, 1);
      saveTransactions();
      render(mockTxs);
    }

    function escapeHtml(s) {
      return String(s)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
